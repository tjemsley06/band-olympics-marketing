<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column;
    background-image: radial-gradient(ellipse at top center, #4c1d95 0%, #1a1a2e 40%, #0a0a0a 80%);
    position: relative;
  }
  .content { position: relative; z-index: 1; padding: 60px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 50px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 12px; }
  .header p { font-size: 22px; color: #a0a0b0; font-weight: 400; }
  .price-hero { text-align: center; margin-bottom: 40px; }
  .price-big {
    font-size: 96px; font-weight: 900; letter-spacing: -0.03em;
    background: linear-gradient(to bottom, #fff, #7c3aed);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .price-per { font-size: 28px; font-weight: 500; color: #a0a0b0; margin-top: -8px; }
  .trial-badge {
    display: inline-block; margin-top: 20px; padding: 12px 32px; border-radius: 100px;
    background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
    font-size: 22px; font-weight: 700; color: #7c3aed;
  }
  .tiers { display: flex; gap: 12px; margin-top: 36px; width: 100%; justify-content: center; }
  .tier {
    background: rgba(26,26,46,0.4); border: 1px solid rgba(124,58,237,0.15);
    border-radius: 12px; padding: 20px 16px; text-align: center; flex: 1; max-width: 180px;
  }
  .tier.popular { border-color: #7c3aed; background: rgba(124,58,237,0.1); }
  .tier-name { font-size: 16px; font-weight: 700; color: #a0a0b0; margin-bottom: 6px; }
  .tier.popular .tier-name { color: #7c3aed; }
  .tier-price { font-size: 28px; font-weight: 900; }
  .tier-students { font-size: 13px; font-weight: 500; color: #a0a0b0; margin-top: 4px; }
  .popular-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    color: #7c3aed; margin-bottom: 6px;
  }
  .footer-bar {
    text-align: center; padding-top: 20px; margin-top: auto;
    border-top: 1px solid rgba(124,58,237,0.2); width: 100%;
  }
  .footer-url { font-size: 18px; font-weight: 500; color: #a0a0b0; }
</style>
</head>
<body>
  <div class="content">
    <div class="header">
      <h1>Simple, Transparent Pricing</h1>
      <p>Less than the cost of two reeds per student per year.</p>
    </div>
    <div class="price-hero">
      <div class="price-big">$99</div>
      <div class="price-per">per year, starting</div>
      <div class="trial-badge">30-Day Free Trial</div>
    </div>
    <div class="tiers">
      <div class="tier">
        <div class="tier-name">Starter</div>
        <div class="tier-price">$99</div>
        <div class="tier-students">Up to 100</div>
      </div>
      <div class="tier popular">
        <div class="popular-label">Most Popular</div>
        <div class="tier-name">Standard</div>
        <div class="tier-price">$149</div>
        <div class="tier-students">Up to 150</div>
      </div>
      <div class="tier">
        <div class="tier-name">Growing</div>
        <div class="tier-price">$189</div>
        <div class="tier-students">Up to 200</div>
      </div>
      <div class="tier">
        <div class="tier-name">Program</div>
        <div class="tier-price">$249</div>
        <div class="tier-students">Up to 250</div>
      </div>
      <div class="tier">
        <div class="tier-name">Unlimited</div>
        <div class="tier-price">$299</div>
        <div class="tier-students">300+</div>
      </div>
    </div>
    <div class="footer-bar">
      <div class="footer-url">bandolympicslive.com</div>
    </div>
  </div>
</body>
</html>
