<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Olympics - Coming Soon</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 2rem;
        }
        .logo {
            width: 320px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.25rem;
            color: #8b949e;
            max-width: 600px;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="https://bandolympics.live/logo.png" alt="Band Olympics Logo" class="logo">
        </div>
        <h1>Coming Soon</h1>
        <p>Something exciting is on the horizon. Stay tuned as we build the ultimate scoreboard for band competitions.</p>
    </div>
</body>
</html>
