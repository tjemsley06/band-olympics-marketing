<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Olympics | Coming Soon</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --accent-purple: #9c4bad;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Ambient Glow Background */
        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(156, 75, 173, 0.15) 0%, rgba(10, 10, 12, 0) 70%);
            z-index: -1;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 160px;
            height: auto;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 25px rgba(156, 75, 173, 0.4));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .badge {
            display: inline-block;
            background: rgba(156, 75, 173, 0.1);
            border: 1px solid var(--accent-purple);
            color: var(--accent-purple);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(48px, 10vw, 72px);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.04em;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 20%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .cta-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent-purple);
            color: white;
            box-shadow: 0 10px 30px rgba(156, 75, 173, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(156, 75, 173, 0.4);
        }

        .live-portal-link {
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        .live-portal-link:hover {
            color: var(--accent-purple);
        }

        .footer {
            margin-top: 80px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 500;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Band Olympics Logo" class="logo">
        
        <div class="badge">Coming Soon</div>
        
        <h1>Band<br>Olympics</h1>
        
        <p>The ultimate competitive platform for school band programs. Gamified scoring, real-time leaderboards, and more.</p>
        
        <div class="cta-container">
            <a href="mailto:info@bandolympics.live" class="btn btn-primary">Get Updates</a>
            <a href="https://bandolympics.live" class="live-portal-link">Looking for the Portal? &rarr;</a>
        </div>

        <div class="footer">
            &copy; 2026 BAND OLYMPICS. ALL RIGHTS RESERVED.
        </div>
    </div>
</body>
</html>
